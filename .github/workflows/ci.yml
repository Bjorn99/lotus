name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

      - name: Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Dump unit test reports on failure
        if: failure()
        run: |
          echo "::group::Unit test XML reports"
          find app/build/test-results -type f -name '*.xml' -print -exec cat {} \; || true
          echo "::endgroup::"
          echo "::group::Unit test text output"
          find app/build/reports/tests -type f \( -name '*.txt' -o -name 'index.html' \) -print || true
          echo "::endgroup::"

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Assemble release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Android lint
        run: ./gradlew lintRelease --stacktrace

      - name: Kotlin static analysis (detekt + ktlint)
        # Both are configured with ignoreFailures = true for now; they report
        # findings but don't break CI until baselines are burned down.
        run: ./gradlew detekt ktlintCheck --stacktrace

      - name: Upload debug APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apks-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload release APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apks-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-*.html
            app/build/reports/detekt/
            app/build/reports/ktlint/
          if-no-files-found: ignore
          retention-days: 14
